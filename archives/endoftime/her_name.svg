<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -310 640 340" font-size="10" font-variant="tabular-nums">
<!--
import html
import json
import time

m = {}
with open('her_name.jsonl', 'r') as f:
    f = [json.loads(j) for j in f]
for j in f:
    for d in j['her_name']:
        k, v = [*d.items()][0]
        m[k] = []
for j in f:
    vmap = {}
    for d in j['her_name']:
        k, v = [*d.items()][0]
        if v in vmap:
            vmap[v] -= .1
            v = vmap[v]
        else:
            vmap[v] = v
        m[k].append((j['diff'], v))
    for k in m:
        if not m[k] or m[k][-1][0] != j['diff']:
            m[k].append((j['diff'], 0))
for k in m:
    while m[k] and m[k][0][1] == 0:
        m[k].pop(0)
    while m[k] and m[k][-1][1] == 0:
        m[k].pop()

canvas_width = 600
canvas_height = 300
margin_top = 10
margin_bottom = 30
margin_left = 30
margin_right = 10

START = time.mktime((2025, 6, 29, 20, 0, 0, 0, 0, -1))
MID = time.mktime((2025, 7, 4, 20, 0, 0, 0, 0, -1))
END = time.mktime((2025, 8, 31, 20, 0, 0, 0, 0, -1))


def transform_x(x: float) -> float:
    x = END - x
    if x > MID:
        x = .75 + (x - MID) / (END - MID) * .25
    else:
        x = (x - START) / (MID - START) * .75
    return x * canvas_width


def transform_y(y: float) -> float:
    if y > 10:
        y = .5 + ((y - 10) / 93) * .5
    else:
        y = .5 * (y / 10)
    return y * -canvas_height


def define_ticks(spec: list[float | tuple[float, str]]) -> dict[float, str]:
    return dict(s if isinstance(s, tuple) else (s, str(s)) for s in spec)


x_ticks = define_ticks([
    (END - t, time.strftime('%-m 月 %-d 日\n%H:%M', time.localtime(t)))
    for t in (START, MID, END)
])
y_ticks = define_ticks([*range(11), 50, 100])
series: list[tuple[str, list[tuple[float, float]]]] = [
    (f'data-name="{html.escape(k) if "\1" not in k else repr(k)}" stroke="black"', d)
    for k, d in m.items()
]

s = f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="{-margin_left} {-canvas_height - margin_top} {margin_left + canvas_width + margin_right} {margin_top + canvas_height + margin_bottom}" font-size="10" font-variant="tabular-nums">
<path fill="#fff" d="M{-margin_left}{-canvas_height - margin_top: }h{margin_left + canvas_width + margin_right}v{margin_top + canvas_height + margin_bottom}h{-margin_left - canvas_width - margin_right}"/>
<g text-anchor="middle">
'''
for x, label in x_ticks.items():
    if label:
        for y, line in enumerate(label.splitlines()):
            s += f'<text x="{transform_x(x)}" y="{y * 12 + 16}">{line}</text>\n'
s += '''</g>
<g text-anchor="end">
'''
for y, label in y_ticks.items():
    if label:
        s += f'<text x="-8" y="{transform_y(y) + 3}">{label}</text>\n'
s += '''</g>
<g fill="none">
<path stroke="currentColor" stroke-opacity=".1" d="'''
for y in y_ticks:
    s += f'M0{transform_y(y): }h{canvas_width}'
s += '''"/>
<path stroke="currentColor" d="'''
for y, label in y_ticks.items():
    if label:
        s += f'M0{transform_y(y): }h-6'
for x, label in x_ticks.items():
    if label:
        s += f'M{transform_x(x)} 0v6'
s += '"/>\n'
for style, data in series:
    style = style.strip() + ' '
    path = ''
    for x, y in data:
        path += f'{transform_x(x): }{transform_y(y): }'
    path = 'M' + path.lstrip()
    s += f'<path {style}d="{path}"/>\n'
s += '''</g>
</svg>'''

print(s)
# 系列标签、颜色等为后期手工添加
-->
